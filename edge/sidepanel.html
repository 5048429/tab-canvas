<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Canvas</title>
    <script>
      (() => {
        const storageKey = "tabCanvas.panelWidth";
        const minWidth = 240;
        const maxWidth = 1600;
        const params = new URLSearchParams(window.location.search);
        const requestedWidth = Number(params.get("panelWidth") || 0);
        const storedWidth = Number(window.localStorage.getItem(storageKey) || 0);
        const width = Math.round(requestedWidth || storedWidth);
        if (!Number.isFinite(width) || width < minWidth) return;
        const clampedWidth = Math.min(maxWidth, Math.max(minWidth, width));
        const cssWidth = `${clampedWidth}px`;
        document.documentElement.style.setProperty("--tab-canvas-panel-width", cssWidth);
        document.documentElement.style.width = cssWidth;
        document.documentElement.style.minWidth = cssWidth;
      })();
    </script>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app">
      <section class="canvas-wrap" id="canvasWrap" aria-label="Tab canvas">
        <div class="canvas-plane" id="canvasPlane">
          <div class="canvas" id="canvas"></div>
        </div>
      </section>

      <header class="top-strip">
        <div class="brand-lockup">
          <strong>Tab Canvas</strong>
          <span id="tabCount">0 tabs</span>
        </div>
        <input id="searchInput" type="search" placeholder="Search" autocomplete="off" />
      </header>

      <aside class="zoom-strip" aria-label="Board zoom">
        <button class="icon-button" id="zoomOutButton" type="button" aria-label="Zoom board out">-</button>
        <input id="zoomSlider" type="range" min="55" max="180" step="5" value="100" aria-label="Board zoom" />
        <span id="zoomValue">100%</span>
        <button class="icon-button" id="zoomInButton" type="button" aria-label="Zoom board in">+</button>
      </aside>

      <footer class="status-pill" aria-live="polite">
        <span id="statusText">Click a card to switch the real browser tab.</span>
      </footer>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
